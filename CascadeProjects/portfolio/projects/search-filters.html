<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Search Filters</title>
    <link rel="stylesheet" href="../css/search-filters.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <h1><i class="fas fa-search"></i> Advanced Search Filters</h1>
            <p>Real-time filtering with multiple parameters and sorting</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Search Bar -->
            <section class="search-section">
                <div class="search-bar">
                    <div class="search-input-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" placeholder="Search for products, services, or anything...">
                        <button class="clear-search" id="clear-search">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <button class="search-btn" id="search-btn">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>

                <!-- Quick Filters -->
                <div class="quick-filters">
                    <button class="quick-filter" data-filter="trending">
                        <i class="fas fa-fire"></i> Trending
                    </button>
                    <button class="quick-filter" data-filter="new">
                        <i class="fas fa-sparkles"></i> New Arrivals
                    </button>
                    <button class="quick-filter" data-filter="sale">
                        <i class="fas fa-tag"></i> On Sale
                    </button>
                    <button class="quick-filter" data-filter="popular">
                        <i class="fas fa-star"></i> Popular
                    </button>
                </div>
            </section>

            <div class="content-wrapper">
                <!-- Filters Sidebar -->
                <aside class="filters-sidebar">
                    <div class="filter-section">
                        <div class="filter-header">
                            <h3>Filters</h3>
                            <button class="reset-filters" id="reset-filters">
                                <i class="fas fa-undo"></i> Reset
                            </button>
                        </div>

                        <!-- Price Range -->
                        <div class="filter-group">
                            <h4>Price Range</h4>
                            <div class="price-range">
                                <div class="range-inputs">
                                    <input type="number" id="min-price" placeholder="Min" min="0">
                                    <span>-</span>
                                    <input type="number" id="max-price" placeholder="Max" min="0">
                                </div>
                                <div class="range-slider">
                                    <div class="slider-track">
                                        <div class="slider-range"></div>
                                    </div>
                                    <input type="range" id="price-min-range" min="0" max="10000" value="0">
                                    <input type="range" id="price-max-range" min="0" max="10000" value="10000">
                                </div>
                            </div>
                        </div>

                        <!-- Categories -->
                        <div class="filter-group">
                            <h4>Categories</h4>
                            <div class="category-filters">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="category" value="electronics">
                                    <span class="checkmark"></span>
                                    Electronics
                                    <span class="count">(245)</span>
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="category" value="clothing">
                                    <span class="checkmark"></span>
                                    Clothing
                                    <span class="count">(189)</span>
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="category" value="home">
                                    <span class="checkmark"></span>
                                    Home & Garden
                                    <span class="count">(156)</span>
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="category" value="sports">
                                    <span class="checkmark"></span>
                                    Sports & Outdoors
                                    <span class="count">(98)</span>
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="category" value="books">
                                    <span class="checkmark"></span>
                                    Books & Media
                                    <span class="count">(234)</span>
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="category" value="toys">
                                    <span class="checkmark"></span>
                                    Toys & Games
                                    <span class="count">(67)</span>
                                </label>
                            </div>
                        </div>

                        <!-- Rating -->
                        <div class="filter-group">
                            <h4>Customer Rating</h4>
                            <div class="rating-filters">
                                <label class="radio-label">
                                    <input type="radio" name="rating" value="4">
                                    <div class="rating-stars">
                                        <i class="fas fa-star"></i>
                                        <i class="fas fa-star"></i>
                                        <i class="fas fa-star"></i>
                                        <i class="fas fa-star"></i>
                                        <i class="far fa-star"></i>
                                        <span>& up</span>
                                    </div>
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="rating" value="3">
                                    <div class="rating-stars">
                                        <i class="fas fa-star"></i>
                                        <i class="fas fa-star"></i>
                                        <i class="fas fa-star"></i>
                                        <i class="far fa-star"></i>
                                        <i class="far fa-star"></i>
                                        <span>& up</span>
                                    </div>
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="rating" value="2">
                                    <div class="rating-stars">
                                        <i class="fas fa-star"></i>
                                        <i class="fas fa-star"></i>
                                        <i class="far fa-star"></i>
                                        <i class="far fa-star"></i>
                                        <i class="far fa-star"></i>
                                        <span>& up</span>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <!-- Location -->
                        <div class="filter-group">
                            <h4>Location</h4>
                            <select id="location-filter" class="location-select">
                                <option value="">All Locations</option>
                                <option value="local">Local Only</option>
                                <option value="national">National</option>
                                <option value="international">International</option>
                            </select>
                        </div>

                        <!-- Availability -->
                        <div class="filter-group">
                            <h4>Availability</h4>
                            <div class="availability-filters">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="availability" value="in-stock">
                                    <span class="checkmark"></span>
                                    In Stock
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="availability" value="pre-order">
                                    <span class="checkmark"></span>
                                    Pre-order
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="availability" value="out-of-stock">
                                    <span class="checkmark"></span>
                                    Out of Stock
                                </label>
                            </div>
                        </div>

                        <!-- Brand -->
                        <div class="filter-group">
                            <h4>Brand</h4>
                            <div class="brand-search">
                                <input type="text" id="brand-search" placeholder="Search brands...">
                            </div>
                            <div class="brand-filters">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="brand" value="apple">
                                    <span class="checkmark"></span>
                                    Apple
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="brand" value="samsung">
                                    <span class="checkmark"></span>
                                    Samsung
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="brand" value="sony">
                                    <span class="checkmark"></span>
                                    Sony
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="brand" value="nike">
                                    <span class="checkmark"></span>
                                    Nike
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="brand" value="adidas">
                                    <span class="checkmark"></span>
                                    Adidas
                                </label>
                            </div>
                        </div>
                    </div>
                </aside>

                <!-- Results Section -->
                <section class="results-section">
                    <!-- Results Header -->
                    <div class="results-header">
                        <div class="results-info">
                            <h2>Search Results</h2>
                            <p class="results-count">Showing <span id="results-count">0</span> results</p>
                        </div>
                        <div class="sort-options">
                            <label for="sort-select">Sort by:</label>
                            <select id="sort-select">
                                <option value="relevance">Relevance</option>
                                <option value="price-low">Price: Low to High</option>
                                <option value="price-high">Price: High to Low</option>
                                <option value="rating">Customer Rating</option>
                                <option value="newest">Newest First</option>
                                <option value="name">Name: A-Z</option>
                            </select>
                            <div class="view-toggle">
                                <button class="view-btn active" data-view="grid">
                                    <i class="fas fa-th"></i>
                                </button>
                                <button class="view-btn" data-view="list">
                                    <i class="fas fa-list"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Active Filters -->
                    <div class="active-filters" id="active-filters">
                        <!-- Active filter tags will be inserted here -->
                    </div>

                    <!-- Results Grid -->
                    <div class="results-grid" id="results-grid">
                        <!-- Results will be dynamically inserted here -->
                    </div>

                    <!-- Pagination -->
                    <div class="pagination" id="pagination">
                        <!-- Pagination will be dynamically inserted here -->
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- Loading Spinner -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <p>Searching...</p>
    </div>

    <script src="../js/search-filters.js"></script>
</body>
</html>
