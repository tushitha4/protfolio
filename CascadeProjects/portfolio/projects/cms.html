<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple CMS</title>
    <link rel="stylesheet" href="../css/cms.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1><i class="fas fa-cogs"></i> Content Management System</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" id="add-content-btn">
                        <i class="fas fa-plus"></i> Add Content
                    </button>
                    <button class="btn btn-outline" id="preview-btn">
                        <i class="fas fa-eye"></i> Preview
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Content Management Section -->
            <section class="cms-section">
                <!-- Toolbar -->
                <div class="toolbar">
                    <div class="toolbar-left">
                        <div class="view-toggle">
                            <button class="view-btn active" data-view="grid">
                                <i class="fas fa-th"></i>
                            </button>
                            <button class="view-btn" data-view="list">
                                <i class="fas fa-list"></i>
                            </button>
                        </div>
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="search-input" placeholder="Search content...">
                        </div>
                    </div>
                    <div class="toolbar-right">
                        <select id="filter-type">
                            <option value="all">All Types</option>
                            <option value="page">Pages</option>
                            <option value="post">Posts</option>
                            <option value="product">Products</option>
                            <option value="category">Categories</option>
                        </select>
                        <select id="sort-content">
                            <option value="date-desc">Newest First</option>
                            <option value="date-asc">Oldest First</option>
                            <option value="title-asc">Title A-Z</option>
                            <option value="title-desc">Title Z-A</option>
                        </select>
                        <button class="btn btn-secondary" id="bulk-actions-btn">
                            <i class="fas fa-check-square"></i> Bulk Actions
                        </button>
                    </div>
                </div>

                <!-- Content Grid/List -->
                <div class="content-container">
                    <div class="content-grid" id="content-grid">
                        <!-- Content items will be dynamically inserted here -->
                    </div>
                </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination">
                    <!-- Pagination will be dynamically inserted here -->
                </div>
            </section>
        </div>
    </main>

    <!-- Content Modal -->
    <div class="modal" id="content-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add New Content</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="content-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="content-title">Title *</label>
                            <input type="text" id="content-title" name="title" required>
                        </div>
                        <div class="form-group">
                            <label for="content-type">Type *</label>
                            <select id="content-type" name="type" required>
                                <option value="page">Page</option>
                                <option value="post">Post</option>
                                <option value="product">Product</option>
                                <option value="category">Category</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="content-slug">URL Slug</label>
                        <input type="text" id="content-slug" name="slug" placeholder="auto-generated-from-title">
                    </div>

                    <div class="form-group">
                        <label for="content-description">Description</label>
                        <textarea id="content-description" name="description" rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="content-content">Content *</label>
                        <div class="editor-toolbar">
                            <button type="button" class="editor-btn" data-command="bold">
                                <i class="fas fa-bold"></i>
                            </button>
                            <button type="button" class="editor-btn" data-command="italic">
                                <i class="fas fa-italic"></i>
                            </button>
                            <button type="button" class="editor-btn" data-command="underline">
                                <i class="fas fa-underline"></i>
                            </button>
                            <button type="button" class="editor-btn" data-command="insertUnorderedList">
                                <i class="fas fa-list-ul"></i>
                            </button>
                            <button type="button" class="editor-btn" data-command="insertOrderedList">
                                <i class="fas fa-list-ol"></i>
                            </button>
                            <button type="button" class="editor-btn" data-command="createLink">
                                <i class="fas fa-link"></i>
                            </button>
                            <button type="button" class="editor-btn" data-command="insertImage">
                                <i class="fas fa-image"></i>
                            </button>
                        </div>
                        <div id="content-editor" class="content-editor" contenteditable="true"></div>
                        <textarea id="content-content" name="content" style="display:none;"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="content-status">Status</label>
                            <select id="content-status" name="status">
                                <option value="draft">Draft</option>
                                <option value="published">Published</option>
                                <option value="archived">Archived</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="content-featured">Featured</label>
                            <select id="content-featured" name="featured">
                                <option value="no">No</option>
                                <option value="yes">Yes</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="content-tags">Tags</label>
                        <input type="text" id="content-tags" name="tags" placeholder="Enter tags separated by commas">
                    </div>

                    <div class="form-group">
                        <label for="content-image">Featured Image</label>
                        <div class="image-upload">
                            <div class="image-preview" id="image-preview">
                                <i class="fas fa-image"></i>
                                <span>No image selected</span>
                            </div>
                            <input type="file" id="content-image" name="image" accept="image/*" style="display:none;">
                            <button type="button" class="btn btn-outline" id="upload-btn">
                                <i class="fas fa-upload"></i> Choose Image
                            </button>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancel-btn">Cancel</button>
                        <button type="button" class="btn btn-outline" id="save-draft-btn">Save Draft</button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Save Content
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bulk Actions Modal -->
    <div class="modal" id="bulk-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Bulk Actions</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <p><span id="selected-count">0</span> items selected</p>
                <div class="bulk-options">
                    <button class="btn btn-outline" data-action="publish">
                        <i class="fas fa-eye"></i> Publish
                    </button>
                    <button class="btn btn-outline" data-action="draft">
                        <i class="fas fa-file-alt"></i> Set to Draft
                    </button>
                    <button class="btn btn-outline" data-action="archive">
                        <i class="fas fa-archive"></i> Archive
                    </button>
                    <button class="btn btn-danger" data-action="delete">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div class="modal" id="preview-modal">
        <div class="modal-content large">
            <div class="modal-header">
                <h2>Content Preview</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="preview-container" id="preview-container">
                    <!-- Preview content will be inserted here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal" id="success-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Success!</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="success-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <p id="success-message">Content saved successfully!</p>
            </div>
        </div>
    </div>

    <script src="../js/cms.js"></script>
</body>
</html>
