<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Data Dashboard</title>
    <link rel="stylesheet" href="../css/live-data.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1><i class="fas fa-chart-line"></i> Live Data Dashboard</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" id="refresh-btn">
                        <i class="fas fa-sync-alt"></i> Refresh Data
                    </button>
                    <button class="btn btn-outline" id="auto-refresh-btn">
                        <i class="fas fa-clock"></i> Auto Refresh: <span id="auto-refresh-status">OFF</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Weather Section -->
            <section class="dashboard-section">
                <div class="section-header">
                    <h2><i class="fas fa-cloud-sun"></i> Weather Data</h2>
                    <div class="location-selector">
                        <select id="weather-location">
                            <option value="New York">New York</option>
                            <option value="London">London</option>
                            <option value="Tokyo">Tokyo</option>
                            <option value="Paris">Paris</option>
                            <option value="Sydney">Sydney</option>
                        </select>
                    </div>
                </div>
                
                <div class="weather-grid" id="weather-grid">
                    <!-- Weather cards will be dynamically inserted here -->
                </div>
            </section>

            <!-- Cryptocurrency Section -->
            <section class="dashboard-section">
                <div class="section-header">
                    <h2><i class="fab fa-bitcoin"></i> Cryptocurrency Prices</h2>
                    <div class="currency-filter">
                        <select id="crypto-filter">
                            <option value="all">All Currencies</option>
                            <option value="top10">Top 10</option>
                            <option value="favorites">Favorites</option>
                        </select>
                    </div>
                </div>
                
                <div class="crypto-grid" id="crypto-grid">
                    <!-- Crypto cards will be dynamically inserted here -->
                </div>
            </section>

            <!-- Stock Market Section -->
            <section class="dashboard-section">
                <div class="section-header">
                    <h2><i class="fas fa-chart-bar"></i> Stock Market</h2>
                    <div class="market-selector">
                        <select id="market-selector">
                            <option value="NASDAQ">NASDAQ</option>
                            <option value="NYSE">NYSE</option>
                            <option value="DOW">DOW Jones</option>
                            <option value="S&P500">S&P 500</option>
                        </select>
                    </div>
                </div>
                
                <div class="stocks-container">
                    <div class="market-overview" id="market-overview">
                        <!-- Market overview will be dynamically inserted here -->
                    </div>
                    
                    <div class="stocks-grid" id="stocks-grid">
                        <!-- Stock cards will be dynamically inserted here -->
                    </div>
                </div>
            </section>

            <!-- Real-time Analytics -->
            <section class="dashboard-section">
                <div class="section-header">
                    <h2><i class="fas fa-analytics"></i> Real-time Analytics</h2>
                    <div class="time-range">
                        <select id="time-range">
                            <option value="1h">Last Hour</option>
                            <option value="24h">Last 24 Hours</option>
                            <option value="7d">Last 7 Days</option>
                            <option value="30d">Last 30 Days</option>
                        </select>
                    </div>
                </div>
                
                <div class="analytics-grid">
                    <div class="chart-container">
                        <h3>Price Trends</h3>
                        <canvas id="price-chart"></canvas>
                    </div>
                    
                    <div class="chart-container">
                        <h3>Volume Analysis</h3>
                        <canvas id="volume-chart"></canvas>
                    </div>
                    
                    <div class="stats-container">
                        <h3>Key Metrics</h3>
                        <div class="metrics-grid" id="metrics-grid">
                            <!-- Metrics will be dynamically inserted here -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- News Feed -->
            <section class="dashboard-section">
                <div class="section-header">
                    <h2><i class="fas fa-newspaper"></i> Latest News</h2>
                    <div class="news-source">
                        <select id="news-source">
                            <option value="all">All Sources</option>
                            <option value="crypto">Crypto News</option>
                            <option value="stocks">Stock Market</option>
                            <option value="tech">Technology</option>
                        </select>
                    </div>
                </div>
                
                <div class="news-feed" id="news-feed">
                    <!-- News items will be dynamically inserted here -->
                </div>
            </section>
        </div>
    </main>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <p>Loading data...</p>
    </div>

    <!-- Error Modal -->
    <div class="modal" id="error-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-exclamation-triangle"></i> Error</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <p id="error-message">Failed to load data. Please try again.</p>
                <button class="btn btn-primary" id="retry-btn">Retry</button>
            </div>
        </div>
    </div>

    <!-- Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/live-data.js"></script>
</body>
</html>
